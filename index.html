<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My OS">
  <meta name="theme-color" content="#0A0E1A">
  <title>Michael's OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div id="app">

    <!-- ── Sidebar (Desktop) ────────────────────────────── -->
    <nav id="sidebar" aria-label="Main navigation">

      <div class="sidebar-header">
        <div class="user-avatar-wrap" aria-hidden="true">ME</div>
        <div>
          <div class="user-meta__name">Michael</div>
          <div class="user-meta__status">
            <span id="sync-dot" class="sync-dot sync-dot--synced" title="Live"></span>
            <span id="sync-label">Live</span>
          </div>
        </div>
      </div>

      <ul id="nav-list" class="nav-list" role="list" aria-label="Modules"></ul>

      <div class="sidebar-footer">
        <div id="live-clock" class="live-clock" aria-live="off"></div>
        <button id="theme-btn" class="theme-btn" aria-label="Toggle light/dark mode">
          <span id="theme-icon">🌙</span>
        </button>
      </div>

    </nav>

    <!-- ── Main Area ─────────────────────────────────────── -->
    <div id="main-area">

      <header id="top-bar">
        <div class="topbar-left">
          <h1 id="page-heading" class="page-heading"></h1>
        </div>
        <div class="topbar-right" id="topbar-actions"></div>
      </header>

      <div id="module-view" role="main">
        <div class="loader"><div class="loader-spinner"></div></div>
      </div>

    </div>

    <!-- ── Bottom Nav (Mobile) ───────────────────────────── -->
    <nav id="bottom-nav" aria-label="Tab navigation">
      <ul id="bottom-nav-list" class="bottom-nav-list" role="list"></ul>
    </nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
