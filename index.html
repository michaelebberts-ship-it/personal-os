<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Command Center">
  <meta name="theme-color" content="#eef1ec">
  <title>Ebberts Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <!-- ── Mission Strip (fixed global top bar) ──────────────────── -->
  <header class="mission-strip">
    <div class="ms-brand"><span class="ms-brand-accent">Ebberts</span> <span>Command Center</span></div>
    <div class="ms-divider"></div>
    <div class="ms-clock" id="live-clock"></div>
    <div class="ms-date" id="ms-date"></div>
    <div class="ms-divider"></div>
    <div class="ms-weather" id="ms-weather">
      <span class="ms-weather-icon" id="ms-weather-icon">☀️</span>
      <span class="ms-weather-temp" id="ms-weather-temp">—°</span>
    </div>
    <div class="ms-status">
      <span class="ms-pulse" id="sync-dot"></span>
      <span class="ms-status-text" id="sync-label">Live</span>
    </div>
    <div class="ms-right">
      <button class="ms-theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode"></button>
    </div>
  </header>

  <!-- ── App shell (below mission strip) ───────────────────────── -->
  <div id="app">

    <!-- ── Sidebar (Desktop — 80px icon-only) ───────────────────── -->
    <nav id="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo" aria-hidden="true">E</div>
      <ul id="nav-list" class="nav-list" role="list" aria-label="Modules"></ul>
    </nav>

    <!-- ── Main Area ─────────────────────────────────────────────── -->
    <div id="main-area">

      <header id="top-bar">
        <div class="topbar-left">
          <h1 id="page-heading" class="page-heading"></h1>
        </div>
        <div class="topbar-right" id="topbar-actions"></div>
      </header>

      <div id="module-view" role="main">
        <div class="loader"><div class="loader-spinner"></div></div>
      </div>

    </div>

    <!-- ── Bottom Nav (Mobile) ───────────────────────────────────── -->
    <nav id="bottom-nav" aria-label="Tab navigation">
      <ul id="bottom-nav-list" class="bottom-nav-list" role="list"></ul>
    </nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module">
    // Dynamic import with timestamp forces fresh ES module load on every page load
    import(`./js/app.js?v=${Date.now()}`);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // When a new version is found, activate it immediately
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'activated') window.location.reload();
          });
        });
      });
    }
  </script>
</body>
</html>
