<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Command Center">
  <meta name="theme-color" content="#0A0E1A">
  <title>Ebberts Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <!-- ── Mission Strip (fixed global top bar) ──────────────────── -->
  <header class="mission-strip">
    <div class="ms-brand">EBBERTS <span>Command Center</span></div>
    <div class="ms-divider"></div>
    <div class="ms-clock" id="live-clock"></div>
    <div class="ms-divider"></div>
    <div class="ms-date" id="ms-date"></div>
    <div class="ms-divider"></div>
    <div class="ms-weather" id="ms-weather">
      <span class="ms-weather-icon" id="ms-weather-icon">☀️</span>
      <span class="ms-weather-temp" id="ms-weather-temp">—°</span>
    </div>
    <div class="ms-status">
      <span class="ms-pulse" id="sync-dot"></span>
      <span class="ms-status-text" id="sync-label">Live</span>
    </div>
    <div class="ms-right">
      <div class="ms-user-badge active-michael">
        <div class="ms-avatar avatar-m">ME</div>
        <span class="ms-user-name name-m">Michael</span>
      </div>
    </div>
  </header>

  <!-- ── App shell (below mission strip) ───────────────────────── -->
  <div id="app">

    <!-- ── Sidebar (Desktop — 64px icon-only) ───────────────────── -->
    <nav id="sidebar" aria-label="Main navigation">
      <ul id="nav-list" class="nav-list" role="list" aria-label="Modules"></ul>
    </nav>

    <!-- ── Main Area ─────────────────────────────────────────────── -->
    <div id="main-area">

      <header id="top-bar">
        <div class="topbar-left">
          <h1 id="page-heading" class="page-heading"></h1>
        </div>
        <div class="topbar-right" id="topbar-actions"></div>
      </header>

      <div id="module-view" role="main">
        <div class="loader"><div class="loader-spinner"></div></div>
      </div>

    </div>

    <!-- ── Bottom Nav (Mobile) ───────────────────────────────────── -->
    <nav id="bottom-nav" aria-label="Tab navigation">
      <ul id="bottom-nav-list" class="bottom-nav-list" role="list"></ul>
    </nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
